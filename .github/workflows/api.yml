name: api

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: Release
  AZURE_WEBAPP_NAME: app-fx-sandbox-api
  PUBLISH_DIR: publish

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Fx.Sandbox.sln

      - name: Build
        run: dotnet build Fx.Sandbox.sln -c $BUILD_CONFIGURATION --no-restore

      - name: Test
        run: |
          dotnet test test/Fx.Sandbox.Domain.Tests       -c $BUILD_CONFIGURATION --no-build --logger "trx;LogFileName=domain.trx"      --collect:"XPlat Code Coverage"
          dotnet test test/Fx.Sandbox.Application.Tests  -c $BUILD_CONFIGURATION --no-build --logger "trx;LogFileName=application.trx" --collect:"XPlat Code Coverage"
          dotnet test test/Fx.Sandbox.Api.Tests          -c $BUILD_CONFIGURATION --no-build --logger "trx;LogFileName=api.trx"         --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/**'

      - name: Publish
        run: dotnet publish src/Fx.Sandbox.Api -c $BUILD_CONFIGURATION -o $PUBLISH_DIR --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./app

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./app
